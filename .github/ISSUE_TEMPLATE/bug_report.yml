name: Bug Report
description: Report a bug in AgentCost
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue
      render: python

  - type: dropdown
    id: edition
    attributes:
      label: Edition
      options:
        - Community
        - Enterprise
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AgentCost version
      placeholder: "1.0.0"

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Docker
