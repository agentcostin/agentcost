name: Docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "has_version=true" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
            echo "has_version=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push (community)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: true
          build-args: EDITION=community
          tags: |
            agentcost/agentcost:latest
            agentcost/agentcost:community
          labels: |
            org.opencontainers.image.title=AgentCost
            org.opencontainers.image.description=Open-source AI cost governance platform
            org.opencontainers.image.url=https://agentcost.in
            org.opencontainers.image.source=https://github.com/agentcostin/agentcost
            org.opencontainers.image.licenses=MIT

      - name: Tag version (community)
        if: steps.meta.outputs.has_version == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: true
          build-args: EDITION=community
          tags: |
            agentcost/agentcost:${{ steps.meta.outputs.version }}

      - name: Build and push (enterprise)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: true
          build-args: EDITION=enterprise
          tags: |
            agentcost/agentcost:enterprise

      - name: Tag version (enterprise)
        if: steps.meta.outputs.has_version == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: true
          build-args: EDITION=enterprise
          tags: |
            agentcost/agentcost:${{ steps.meta.outputs.version }}-enterprise

      - name: Update Docker Hub description
        if: steps.meta.outputs.has_version == 'true'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: agentcost/agentcost
          short-description: "Open-source AI cost governance — track, control, and optimize LLM spending"
          readme-filepath: ./README.md