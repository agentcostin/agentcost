name: Docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push (community)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: true
          build-args: EDITION=community
          tags: |
            ghcr.io/agentcostin/agentcost:latest
            ghcr.io/agentcostin/agentcost:${{ steps.meta.outputs.version }}
            ghcr.io/agentcostin/agentcost:community
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

      - name: Build and push (enterprise)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: true
          build-args: EDITION=enterprise
          tags: |
            ghcr.io/agentcostin/agentcost:enterprise
            ghcr.io/agentcostin/agentcost:${{ steps.meta.outputs.version }}-enterprise
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}-enterprise
