name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'site/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install mkdocs-material mkdocs-autorefs

      - name: Build combined site
        run: |
          mkdocs build --site-dir _build/docs
          cp site/index.html _build/index.html
          cp site/CNAME _build/CNAME
          cp -r site/assets _build/assets 2>/dev/null || true
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=/"></head></html>' > _build/404.html
          echo "Built:"
          ls _build/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_build
          cname: agentcost.in
