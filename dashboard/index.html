<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentCost — AI Cost Governance</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧮</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
<script src="/dashboard/js/api.js"></script>
<script src="/dashboard/js/models.js"></script>
<style>
:root {
  --bg-0:#0a0b0f;--bg-1:#12131a;--bg-2:#1a1b24;--bg-3:#22232e;
  --border:#2a2b38;--border-h:#3a3b48;
  --text-0:#f0f0f4;--text-1:#c8c8d0;--text-2:#8b8b99;--text-3:#5a5a68;
  --accent:#e85d3a;--accent-h:#ff7a56;
  --green:#34d399;--green-bg:#0d2818;--red:#f87171;--red-bg:#2d0f0f;
  --blue:#60a5fa;--yellow:#fbbf24;--purple:#a78bfa;
  --radius:10px;--radius-sm:6px;
  --font:'DM Sans',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg-0);color:var(--text-1);font-size:14px;line-height:1.5}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--bg-1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:1.2rem 1rem;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:1.1rem;font-weight:700;color:var(--text-0);letter-spacing:-.02em}
.sidebar-header h1 span{color:var(--accent)}
.sidebar-header .ver{font-size:.65rem;color:var(--text-3);font-family:var(--mono);margin-top:2px}
.sidebar-nav{flex:1;padding:.5rem;overflow-y:auto}
.nav-section{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-3);padding:.8rem .7rem .3rem;font-weight:600}
.nav-item{display:flex;align-items:center;gap:.6rem;padding:.55rem .7rem;border-radius:var(--radius-sm);color:var(--text-2);cursor:pointer;font-size:.82rem;font-weight:500;transition:all .15s}
.nav-item:hover{background:var(--bg-2);color:var(--text-1)}
.nav-item.active{background:var(--accent);color:#fff}
.nav-item .icon{font-size:1rem;width:1.4rem;text-align:center}
.nav-item .badge-count{margin-left:auto;font-size:.65rem;background:var(--accent);color:#fff;padding:.1rem .4rem;border-radius:8px;font-weight:600}
.sidebar-footer{padding:.8rem 1rem;border-top:1px solid var(--border);font-size:.72rem;color:var(--text-3)}
.sidebar-footer .status{display:flex;align-items:center;gap:.4rem}
.sidebar-footer .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.sidebar-footer .dot.off{background:var(--red)}

.main{flex:1;overflow-y:auto;background:var(--bg-0)}
.main-header{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg-1);position:sticky;top:0;z-index:10}
.main-header h2{font-size:1.1rem;font-weight:600;color:var(--text-0)}
.main-header .controls{display:flex;gap:.5rem;align-items:center}
.main-content{padding:1.5rem}

.grid{display:grid;gap:1rem}.g4{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr 1fr}.g1{grid-template-columns:1fr}
.card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem}
.card h3{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:.4rem;font-weight:600}
.card .val{font-size:1.5rem;font-weight:700;color:var(--text-0);font-family:var(--mono)}
.card .sub{font-size:.72rem;color:var(--text-2);margin-top:.15rem}
.stat-card{text-align:center;padding:1.4rem}.stat-card .val{font-size:1.8rem}

table{width:100%;border-collapse:collapse;font-size:.8rem}
th{text-align:left;padding:.5rem .7rem;border-bottom:2px solid var(--border);color:var(--text-3);font-weight:600;font-size:.65rem;text-transform:uppercase;letter-spacing:.06em}
td{padding:.5rem .7rem;border-bottom:1px solid var(--bg-3);color:var(--text-2)}
td:first-child{color:var(--text-1);font-weight:500}tr:hover td{background:var(--bg-2)}

.badge{font-size:.65rem;padding:.15rem .45rem;border-radius:6px;font-weight:600;font-family:var(--mono)}
.badge.ok{background:var(--green-bg);color:var(--green)}.badge.err{background:var(--red-bg);color:var(--red)}
.badge.warn{background:#2d2200;color:var(--yellow)}.badge.info{background:#0d1b2d;color:var(--blue)}.badge.purple{background:#1a0d2d;color:var(--purple)}

.btn{padding:.45rem .9rem;border-radius:var(--radius-sm);font-size:.78rem;font-weight:600;border:1px solid var(--border);background:var(--bg-2);color:var(--text-1);cursor:pointer;transition:.15s;font-family:var(--font)}
.btn:hover{border-color:var(--border-h);background:var(--bg-3)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn.primary:hover{background:var(--accent-h)}
.btn.sm{padding:.3rem .6rem;font-size:.7rem}

select,input{background:var(--bg-2);color:var(--text-1);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.4rem .7rem;font-size:.8rem;font-family:var(--font);outline:none}
select:focus,input:focus{border-color:var(--accent)}

.empty{text-align:center;padding:2.5rem;color:var(--text-3);font-size:.85rem}
.empty .icon{font-size:2rem;margin-bottom:.5rem;display:block}
.loading{text-align:center;padding:2rem;color:var(--text-3)}

.form-row{display:flex;gap:.5rem;align-items:flex-end;margin-bottom:.8rem;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:.2rem}
.form-group label{font-size:.65rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.form-group input,.form-group select{min-width:140px}

.alert-bar{padding:.6rem 1rem;border-radius:var(--radius-sm);font-size:.78rem;margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem}
.alert-bar.warn{background:#2d2200;border:1px solid #4d3a00;color:var(--yellow)}
.alert-bar.danger{background:var(--red-bg);border:1px solid #4d1f1f;color:var(--red)}
.alert-bar.success{background:var(--green-bg);border:1px solid #1a4d2a;color:var(--green)}

.grade{display:inline-flex;align-items:center;justify-content:center;width:2rem;height:2rem;border-radius:50%;font-weight:700;font-size:.85rem;font-family:var(--mono)}
.grade.A{background:var(--green-bg);color:var(--green);border:2px solid var(--green)}
.grade.B{background:#0d2818;color:#6ee7b7;border:2px solid #6ee7b7}
.grade.C{background:#2d2200;color:var(--yellow);border:2px solid var(--yellow)}
.grade.D{background:#2d1a00;color:#fb923c;border:2px solid #fb923c}
.grade.F{background:var(--red-bg);color:var(--red);border:2px solid var(--red)}

.login-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg-0)}
.login-box{background:var(--bg-1);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:380px;text-align:center}
.login-box h1{font-size:1.6rem;font-weight:700;color:var(--text-0);margin-bottom:.3rem}
.login-box h1 span{color:var(--accent)}
.login-box .tagline{font-size:.82rem;color:var(--text-2);margin-bottom:2rem}
.login-box .btn-login{display:block;width:100%;padding:.75rem;font-size:.9rem;margin-bottom:.8rem}
.login-box .divider{display:flex;align-items:center;gap:.8rem;margin:1.2rem 0;color:var(--text-3);font-size:.72rem}
.login-box .divider::before,.login-box .divider::after{content:'';flex:1;height:1px;background:var(--border)}
.login-box .hint{font-size:.72rem;color:var(--text-3);margin-top:1rem}
.login-box input{width:100%;margin-bottom:.5rem}
.user-pill{display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:var(--text-2);background:var(--bg-2);padding:.35rem .7rem;border-radius:20px;cursor:pointer;transition:.15s;width:100%}
.user-pill:hover{background:var(--bg-3);color:var(--text-1)}
.user-pill .avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0}
.user-pill .uname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-menu{position:absolute;bottom:100%;left:.5rem;right:.5rem;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius);padding:.5rem;margin-bottom:.5rem;box-shadow:0 -4px 20px rgba(0,0,0,.4);z-index:20}
.user-menu .um-header{display:flex;align-items:center;gap:.6rem;padding:.5rem;border-bottom:1px solid var(--border);margin-bottom:.4rem}
.user-menu .um-header .avatar{width:36px;height:36px;font-size:.8rem}
.user-menu .um-header .um-info{flex:1;min-width:0}
.user-menu .um-header .um-name{font-size:.82rem;font-weight:600;color:var(--text-0)}
.user-menu .um-header .um-email{font-size:.68rem;color:var(--text-3);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis}
.user-menu .um-item{display:flex;align-items:center;gap:.5rem;padding:.45rem .5rem;border-radius:var(--radius-sm);color:var(--text-2);cursor:pointer;font-size:.78rem;transition:.15s}
.user-menu .um-item:hover{background:var(--bg-2);color:var(--text-1)}
.user-menu .um-item.danger:hover{background:var(--red-bg);color:var(--red)}
.user-menu .um-divider{height:1px;background:var(--border);margin:.3rem 0}

.profile-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.profile-modal .pm-box{background:var(--bg-1);border:1px solid var(--border);border-radius:16px;padding:1.5rem;width:400px;max-width:90vw}
.profile-modal .pm-box h2{font-size:1rem;font-weight:600;color:var(--text-0);margin-bottom:1rem}
.profile-modal .pm-row{margin-bottom:.8rem}
.profile-modal .pm-row label{display:block;font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:600;margin-bottom:.2rem}
.profile-modal .pm-row input{width:100%}
.profile-modal .pm-actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem}

@media(max-width:900px){
  .sidebar{width:56px}.sidebar .nav-item span,.sidebar-header h1,.sidebar-header .ver,.nav-section,.sidebar-footer span{display:none}
  .sidebar-header{padding:.8rem .6rem}.nav-item{justify-content:center;padding:.55rem}.nav-item .icon{width:auto}
  .g2,.g3{grid-template-columns:1fr}.g4{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback} = React;
const {LineChart,Line,BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,CartesianGrid,PieChart,Pie,Cell} = Recharts;

const BASE = window.location.origin;
const COLORS = ['#e85d3a','#60a5fa','#34d399','#fbbf24','#a78bfa','#f472b6','#22d3ee','#fb923c'];

/* ── Auth + API ─────────────────────────────────────────────────────────── */

let _token = null;
try { _token = sessionStorage.getItem('agentcost_token'); } catch {}

function setToken(t) { _token = t; try { if(t) sessionStorage.setItem('agentcost_token',t); else sessionStorage.removeItem('agentcost_token'); } catch {} }

async function api(path, opts={}) {
  const headers = {'Content-Type':'application/json',...(opts.headers||{})};
  if (_token) headers['Authorization'] = `Bearer ${_token}`;
  try { const r = await fetch(BASE+path,{...opts,headers,credentials:'include'}); if(r.ok) return r.json(); if(r.status===401){setToken(null);} return null; } catch{ return null; }
}
const apiPost = (p,b) => api(p,{method:'POST',body:JSON.stringify(b)});
const apiPut  = (p,b) => api(p,{method:'PUT',body:JSON.stringify(b)});
const apiDel  = (p)   => api(p,{method:'DELETE'});

const fmt$ = v => `$${(v||0).toFixed(4)}`;
const fmtPct = v => `${(v||0).toFixed(1)}%`;
const fmtN = v => (v||0).toLocaleString();
const fmtTime = ts => ts && typeof ts==='string' ? ts.slice(11,19) : '';
const fmtDate = ts => ts && typeof ts==='string' ? ts.slice(0,10) : '';

function Card({title,value,sub,color}){return <div className="card"><h3>{title}</h3><div className={`val ${color||''}`}>{value}</div>{sub&&<div className="sub">{sub}</div>}</div>;}
function StatCard({title,value,sub}){return <div className="card stat-card"><h3>{title}</h3><div className="val">{value}</div>{sub&&<div className="sub">{sub}</div>}</div>;}
function Empty({icon,text}){return <div className="empty">{icon&&<span className="icon">{icon}</span>}{text}</div>;}

/* ── Overview ───────────────────────────────────────────────────────────── */

function Overview({project}){
  const [data,setData]=useState(null);const [models,setModels]=useState([]);const [timeline,setTimeline]=useState([]);
  const [bench,setBench]=useState(null);
  const load=useCallback(async()=>{
    const q=project?`?project=${project}`:'';const q2=q?`${q}&`:'?';
    const [s,m,t,lb]=await Promise.all([
      api(`/api/summary${q}`),api(`/api/cost/by-model${q}`),
      api(`/api/cost/over-time${q2}interval=hour&since_hours=48`),
      api('/api/benchmarks/leaderboard'),
    ]);
    setData(s);setModels(m||[]);setTimeline(t||[]);
    // Aggregate benchmark stats
    if(lb&&lb.length){
      const totIncome=lb.reduce((a,b)=>a+(b.total_income||0),0);
      const totCost=lb.reduce((a,b)=>a+(b.total_cost||0),0);
      const totRuns=lb.reduce((a,b)=>a+(b.total_runs||0),0);
      const avgQ=lb.reduce((a,b)=>a+(b.avg_quality||0),0)/lb.length;
      setBench({income:totIncome,cost:totCost,runs:totRuns,avgQuality:avgQ,profit:totIncome-totCost,models:lb.length});
    }
  },[project]);
  useEffect(()=>{load();const i=setInterval(load,15000);return()=>clearInterval(i);},[load]);
  if(!data) return <div className="loading">Loading…</div>;
  return <>
    <div className="grid g4" style={{marginBottom:'1rem'}}>
      <Card title="Total Cost" value={fmt$(data.total_cost)} sub={`${fmtN(data.total_calls)} calls`}/>
      <Card title="Input Tokens" value={fmtN(data.total_input_tokens)}/>
      <Card title="Output Tokens" value={fmtN(data.total_output_tokens)}/>
      <Card title="Avg Latency" value={`${(data.avg_latency||0).toFixed(0)}ms`} sub={`${data.model_count||0} models`}/>
    </div>
    {bench&&bench.runs>0&&<>
      <div className="grid g4" style={{marginBottom:'1rem'}}>
        <Card title="Benchmark Income" value={`$${bench.income.toFixed(2)}`} sub={`${bench.runs} runs`}/>
        <Card title="Net Profit" value={`$${bench.profit.toFixed(2)}`} sub={`${bench.models} models tested`}/>
        <Card title="Avg Quality" value={bench.avgQuality.toFixed(3)} sub={bench.avgQuality>=0.7?'Good':bench.avgQuality>=0.4?'Moderate':'Low'}/>
        <Card title="ROI" value={bench.cost>0?`${(bench.profit/bench.cost).toFixed(0)}x`:'∞'} sub="income ÷ cost"/>
      </div>
    </>}
    <div className="grid g2">
      <div className="card"><h3>Cost Over Time (48h)</h3>
        {timeline.length?<ResponsiveContainer width="100%" height={220}>
          <LineChart data={timeline}><CartesianGrid strokeDasharray="3 3" stroke="#2a2b38"/>
            <XAxis dataKey="time_bucket" tick={{fontSize:10,fill:'#8b8b99'}} tickFormatter={v=>v?.slice(11)||v}/>
            <YAxis tick={{fontSize:10,fill:'#8b8b99'}} tickFormatter={v=>`$${v}`}/>
            <Tooltip contentStyle={{background:'#1a1b24',border:'1px solid #2a2b38',borderRadius:8,fontSize:12}} formatter={v=>[`$${v?.toFixed(6)}`,'Cost']}/>
            <Line type="monotone" dataKey="cost" stroke="#e85d3a" strokeWidth={2} dot={false}/></LineChart>
        </ResponsiveContainer>:<Empty text="No data yet"/>}
      </div>
      <div className="card"><h3>Cost by Model</h3>
        {models.length?<ResponsiveContainer width="100%" height={220}>
          <BarChart data={models} layout="vertical"><CartesianGrid strokeDasharray="3 3" stroke="#2a2b38"/>
            <XAxis type="number" tick={{fontSize:10,fill:'#8b8b99'}} tickFormatter={v=>`$${v}`}/>
            <YAxis type="category" dataKey="model" tick={{fontSize:10,fill:'#8b8b99'}} width={130}/>
            <Tooltip contentStyle={{background:'#1a1b24',border:'1px solid #2a2b38',borderRadius:8,fontSize:12}} formatter={v=>[`$${v?.toFixed(6)}`,'Cost']}/>
            <Bar dataKey="total_cost" fill="#60a5fa" radius={[0,4,4,0]}/></BarChart>
        </ResponsiveContainer>:<Empty text="No model data"/>}
      </div>
    </div>
  </>;
}

/* ── Benchmarks ──────────────────────────────────────────────────────────── */

function Benchmarks(){
  const [runs,setRuns]=useState([]);const [leaderboard,setLeaderboard]=useState([]);
  const [selectedRun,setSelectedRun]=useState(null);const [runDetails,setRunDetails]=useState([]);
  const load=useCallback(async()=>{
    const [r,l]=await Promise.all([api('/api/benchmarks/runs'),api('/api/benchmarks/leaderboard')]);
    setRuns(r||[]);setLeaderboard(l||[]);
  },[]);
  useEffect(()=>{load();},[load]);

  const viewRun=async(runId)=>{
    if(selectedRun===runId){setSelectedRun(null);setRunDetails([]);return;}
    const d=await api(`/api/benchmarks/run/${runId}`);
    setRunDetails(d||[]);setSelectedRun(runId);
  };

  const qualityColor=(q)=>q>=0.7?'var(--green)':q>=0.4?'#f59e0b':'var(--red)';
  const roiColor=(r)=>r>=100?'var(--green)':r>=10?'#60a5fa':'var(--text-2)';

  return <>
    {leaderboard.length>0&&<>
      <h3 style={{marginBottom:'.8rem',color:'var(--text-1)'}}>🏆 Model Leaderboard</h3>
      <div className="card" style={{marginBottom:'1.5rem',overflowX:'auto'}}>
        <table><thead><tr><th>Model</th><th>Runs</th><th>Avg Quality</th><th>Avg ROI</th><th>Total Income</th><th>Total Cost</th></tr></thead>
        <tbody>{leaderboard.map((m,i)=><tr key={i}>
          <td><strong>{m.model}</strong></td>
          <td>{m.total_runs}</td>
          <td style={{color:qualityColor(m.avg_quality)}}>{(m.avg_quality||0).toFixed(3)}</td>
          <td style={{color:roiColor(m.avg_roi)}}>{(m.avg_roi||0).toFixed(1)}x</td>
          <td style={{color:'var(--green)'}}>${(m.total_income||0).toFixed(2)}</td>
          <td>${(m.total_cost||0).toFixed(6)}</td>
        </tr>)}</tbody></table>
      </div>
    </>}
    <h3 style={{marginBottom:'.8rem',color:'var(--text-1)'}}>📋 Benchmark Runs</h3>
    {runs.length?<div className="card" style={{overflowX:'auto'}}>
      <table><thead><tr><th>Run ID</th><th>Model</th><th>Tasks</th><th>Quality</th><th>Income</th><th>Cost</th><th>Net Profit</th><th>ROI</th><th>Time</th></tr></thead>
      <tbody>{runs.map((r,i)=>{
        const net=(r.total_income||0)-(r.total_cost||0);
        const roi=r.total_cost>0?net/r.total_cost:0;
        return <React.Fragment key={i}>
          <tr style={{cursor:'pointer'}} onClick={()=>viewRun(r.run_id)}>
            <td><code style={{fontSize:'.75rem'}}>{r.run_id}</code></td>
            <td><strong>{r.model}</strong></td>
            <td>{r.completed_tasks}/{r.total_tasks}</td>
            <td style={{color:qualityColor(r.avg_quality)}}>{(r.avg_quality||0).toFixed(3)}</td>
            <td style={{color:'var(--green)'}}>${(r.total_income||0).toFixed(2)}</td>
            <td>${(r.total_cost||0).toFixed(6)}</td>
            <td style={{color:net>=0?'var(--green)':'var(--red)'}}>${net.toFixed(2)}</td>
            <td style={{color:roiColor(roi)}}>{roi.toFixed(0)}x</td>
            <td style={{fontSize:'.75rem',color:'var(--text-3)'}}>{(r.timestamp||'').slice(0,19)}</td>
          </tr>
          {selectedRun===r.run_id&&runDetails.length>0&&<tr><td colSpan="9" style={{padding:0}}>
            <div style={{background:'var(--bg-0)',padding:'.8rem',borderRadius:'var(--radius-sm)'}}>
              <table style={{margin:0}}><thead><tr><th>Task</th><th>Sector</th><th>Quality</th><th>Max Pay</th><th>Earned</th><th>LLM Cost</th><th>ROI</th><th>Tokens</th></tr></thead>
              <tbody>{runDetails.map((d,j)=><tr key={j}>
                <td style={{fontSize:'.8rem'}}>{d.occupation}</td>
                <td style={{fontSize:'.75rem',color:'var(--text-3)'}}>{d.sector}</td>
                <td style={{color:qualityColor(d.quality_score)}}>{(d.quality_score||0).toFixed(2)}</td>

        <div className="card" style={{padding:'.8rem',textAlign:'center'}}><div style={{fontSize:'.7rem',color:'var(--text-3)'}}>CONFIDENCE</div><div style={{fontSize:'1.4rem',fontWeight:700}}>{(forecast.confidence*100).toFixed(0)}%</div></div>
      </div>
      {forecast.forecasts.length>0&&<div style={{height:220,marginBottom:'1rem'}}><ResponsiveContainer width="100%" height="100%"><BarChart data={forecast.forecasts}><CartesianGrid strokeDasharray="3 3" stroke="var(--border)"/><XAxis dataKey="date" tick={{fontSize:10,fill:'var(--text-3)'}} tickFormatter={d=>d.slice(5)}/><YAxis tick={{fontSize:10,fill:'var(--text-3)'}} tickFormatter={v=>`$${v.toFixed(2)}`}/><Tooltip contentStyle={{background:'var(--bg-2)',border:'1px solid var(--border)',borderRadius:6,fontSize:'.8rem'}} formatter={v=>[`$${v.toFixed(4)}`,'Predicted']}/><Bar dataKey="predicted_cost" radius={[3,3,0,0]}>{forecast.forecasts.map((_,i)=><Cell key={i} fill={i%2===0?'var(--accent)':'#ff7a56'}/>)}</Bar></BarChart></ResponsiveContainer></div>}
    </div>:<div style={{padding:'2.5rem',textAlign:'center',color:'var(--text-3)'}}><div style={{fontSize:'2.5rem',marginBottom:'.5rem'}}>🔮</div><div>Need at least 2 days of trace data to forecast.</div></div>}</div>
    <div className="card" style={{marginTop:'1rem'}}><div className="card-header"><h3>⏰ Budget Exhaustion</h3><div style={{display:'flex',gap:'.5rem',alignItems:'center'}}>
      <span style={{fontSize:'.8rem',color:'var(--text-3)'}}>Budget: $</span>
      <input type="number" value={budget} onChange={e=>setBudget(+e.target.value)} style={{...sel,width:'80px'}}/>
      <button className="btn sm" onClick={load}>Calculate</button>
    </div></div>
    {exhaustion&&exhaustion.days_remaining!=null?<div style={{padding:'1rem'}}><div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'1rem'}}>
      <div className="card" style={{padding:'.8rem',textAlign:'center'}}><div style={{fontSize:'.7rem',color:'var(--text-3)'}}>EXHAUSTION DATE</div><div style={{fontSize:'1.2rem',fontWeight:700,color:exhaustion.days_remaining<7?'var(--red)':exhaustion.days_remaining<30?'var(--amber)':'var(--green)'}}>{exhaustion.exhaustion_date}</div></div>
      <div className="card" style={{padding:'.8rem',textAlign:'center'}}><div style={{fontSize:'.7rem',color:'var(--text-3)'}}>DAYS REMAINING</div><div style={{fontSize:'1.4rem',fontWeight:700}}>{exhaustion.days_remaining}</div></div>
      <div className="card" style={{padding:'.8rem',textAlign:'center'}}><div style={{fontSize:'.7rem',color:'var(--text-3)'}}>BURN RATE</div><div style={{fontSize:'1.2rem',fontWeight:700,fontFamily:'var(--mono)'}}>${exhaustion.daily_burn_rate.toFixed(2)}/day</div></div>
    </div></div>:<div style={{padding:'1.5rem',textAlign:'center',color:'var(--text-3)',fontSize:'.85rem'}}>{exhaustion?.message||'Budget not projected to be exhausted'}</div>}
    </div>
  </div>;
}

      <tr><td style={{color:'var(--text-3)'}}>Total Cost</td><td style={{fontFamily:'var(--mono)',fontWeight:600}}>${analytics.total_cost.toFixed(4)}</td></tr>
      <tr><td style={{color:'var(--text-3)'}}>Total Tokens</td><td style={{fontFamily:'var(--mono)',fontWeight:600}}>{(analytics.total_tokens||0).toLocaleString()}</td></tr>

function EstimatorView(){
  const registry=AgentCost.MODEL_REGISTRY;const providers=AgentCost.getProviders();const tierColors=AgentCost.TIER_COLORS;const providerColors=AgentCost.PROVIDER_COLORS;

  const [estimate,setEstimate]=useState(null);const [comparison,setComparison]=useState(null);const [loading,setLoading]=useState(false);const [showPricing,setShowPricing]=useState(false);
  const tasks=['default','chat','code','summary','analysis','creative','classification','translation'];
  async function doEstimate(){if(!prompt)return;setLoading(true);try{const [e,c]=await Promise.all([_api('/api/estimate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model,prompt,task_type:taskType})}),_api(`/api/estimate/compare?prompt=${encodeURIComponent(prompt)}&task_type=${taskType}`)]);setEstimate(e);setComparison(c);}catch(e){console.error(e)}setLoading(false);}
  const selModel=registry.find(m=>m.id===model);

      {selModel&&<div style={{padding:'.5rem .7rem',marginBottom:'.8rem',background:'var(--bg-2)',borderRadius:'var(--radius-sm)',fontSize:'.8rem',display:'flex',alignItems:'center',gap:'1rem',flexWrap:'wrap'}}>
        <span style={{color:providerColors[selModel.provider]||'var(--text-2)',fontWeight:600}}>{selModel.provider}</span>
        <span style={{color:'var(--text-2)'}}>·</span>
        {selModel.tier==='free'
          ?<span style={{color:'var(--green)',fontWeight:600}}>Free (self-hosted)</span>
          :<><span style={{fontFamily:'var(--mono)'}}>
            <span style={{color:'var(--text-3)'}}>Input:</span> <span style={{color:'var(--text-1)',fontWeight:600}}>${selModel.input.toFixed(2)}</span><span style={{color:'var(--text-3)'}}> per 1M tokens</span>
          </span>
          <span style={{color:'var(--text-2)'}}>·</span>
          <span style={{fontFamily:'var(--mono)'}}>
            <span style={{color:'var(--text-3)'}}>Output:</span> <span style={{color:'var(--text-1)',fontWeight:600}}>${selModel.output.toFixed(2)}</span><span style={{color:'var(--text-3)'}}> per 1M tokens</span>
          </span></>}
        <span style={{color:'var(--text-2)'}}>·</span>
        <span style={{color:'var(--text-3)'}}>{selModel.context>=1000?(selModel.context/1000).toFixed(0)+'M':selModel.context+'K'} context</span>
        <span style={{marginLeft:'auto',fontSize:'.65rem',background:tierColors[selModel.tier]||'var(--text-3)',color:'#fff',padding:'.1rem .35rem',borderRadius:'3px'}}>{selModel.tier}</span>
      </div>}
      <textarea value={prompt} onChange={e=>setPrompt(e.target.value)} placeholder="Enter your prompt here to estimate cost before sending…" style={{width:'100%',minHeight:'90px',padding:'.6rem',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',background:'var(--bg-1)',color:'var(--text-1)',fontSize:'.85rem',fontFamily:'var(--mono)',resize:'vertical',boxSizing:'border-box'}}/>
    </div></div>
    {estimate&&<div className="card" style={{marginTop:'1rem'}}><div className="card-header"><h3>💰 {estimate.model}</h3></div><div style={{padding:'1rem'}}>

        <div className="card" style={{padding:'.8rem',textAlign:'center'}}><div style={{fontSize:'.7rem',color:'var(--text-3)'}}>EST. COST</div><div style={{fontSize:'1.4rem',fontWeight:700,fontFamily:'var(--mono)',color:'var(--accent)'}}>${estimate.estimated_cost.toFixed(6)}</div></div>

        <div className="card" style={{padding:'.8rem',textAlign:'center'}}><div style={{fontSize:'.7rem',color:'var(--text-3)'}}>CONFIDENCE</div><div style={{fontSize:'1.2rem',fontWeight:700}}>{estimate.confidence}</div></div>

    </div></div>}
    {comparison&&<div className="card" style={{marginTop:'1rem'}}><div className="card-header"><h3>📊 Model Comparison</h3></div><div style={{padding:'1rem'}}>
      <table><thead><tr><th>Model</th><th>Est. Cost</th><th>Input Tok</th><th>Output Tok</th><th>Source</th></tr></thead>
      <tbody>{comparison.map((c,i)=>{const meta=registry.find(m=>m.id===c.model);return <tr key={i} style={c.model===model?{background:'var(--bg-2)'}:{}}>
        <td style={{fontWeight:c.model===model?700:400}}>{c.model}{c.model===model?' ✓':''}{meta&&<span style={{fontSize:'.65rem',marginLeft:'.4rem',color:providerColors[meta.provider]||'var(--text-3)'}}>{meta.provider}</span>}</td>
        <td style={{fontFamily:'var(--mono)',color:c.estimated_cost===0?'var(--green)':'var(--text-1)'}}>${c.estimated_cost.toFixed(6)}</td>
        <td style={{fontFamily:'var(--mono)'}}>{c.estimated_input_tokens}</td><td style={{fontFamily:'var(--mono)'}}>{c.estimated_output_tokens}</td>
        <td><span style={{fontSize:'.65rem',background:c.pricing_source==='free'?'var(--green)':c.pricing_source==='known'?'var(--accent)':'var(--amber)',color:'#fff',padding:'.1rem .3rem',borderRadius:'3px'}}>{c.pricing_source}</span></td>
      </tr>})}</tbody></table></div></div>}
    {showPricing&&<div className="card" style={{marginTop:'1rem'}}><div className="card-header"><h3>💲 Model Pricing Reference</h3><span style={{fontSize:'.75rem',color:'var(--text-3)'}}>Feb 2026 · per 1M tokens</span></div><div style={{padding:'1rem'}}>
      <table><thead><tr><th>Model</th><th>Provider</th><th>Input $/M</th><th>Output $/M</th><th>Tier</th><th>Context</th></tr></thead>
      <tbody>{registry.filter(m=>m.tier!=='free').map((m,i)=><tr key={i}>
        <td style={{fontWeight:500}}>{m.label}</td>
        <td><span style={{color:providerColors[m.provider],fontSize:'.8rem'}}>{m.provider}</span></td>
        <td style={{fontFamily:'var(--mono)'}}>${m.input.toFixed(2)}</td>
        <td style={{fontFamily:'var(--mono)'}}>${m.output.toFixed(2)}</td>
        <td><span style={{fontSize:'.65rem',background:tierColors[m.tier]||'var(--text-3)',color:'#fff',padding:'.1rem .35rem',borderRadius:'3px'}}>{m.tier}</span></td>
        <td style={{fontFamily:'var(--mono)',fontSize:'.8rem'}}>{m.context>=1000?(m.context/1000).toFixed(0)+'M':m.context+'K'}</td>
      </tr>)}</tbody></table>
      <div style={{marginTop:'.8rem',fontSize:'.75rem',color:'var(--text-3)'}}>Local models (Llama 3, Mistral, Mixtral, Qwen2) are free when self-hosted via Ollama.</div>
    </div></div>}
  </div>;
}

      <tbody>{entries.map((e,i)=><tr key={i}>

        <td><span className="badge purple">{e.event_type}</span></td>

    </div>
  </>;

      <div className="card"><h3>Current User</h3>
        {user?<table><tbody>
          <tr><td>Email</td><td style={{fontFamily:'var(--mono)'}}>{user.email}</td></tr>
          <tr><td>Name</td><td>{user.name||'—'}</td></tr>
          <tr><td>Role</td><td><span className="badge info">{user.role}</span></td></tr>
          <tr><td>Auth Method</td><td><span className="badge purple">{user.auth_method}</span></td></tr>
          <tr><td>Org ID</td><td style={{fontFamily:'var(--mono)',fontSize:'.72rem'}}>{user.org_id}</td></tr>
          <tr><td>User ID</td><td style={{fontFamily:'var(--mono)',fontSize:'.72rem'}}>{user.user_id}</td></tr>
        </tbody></table>:<div style={{color:'var(--text-3)',fontSize:'.82rem'}}>Not authenticated</div>}
      </div>
      <div className="card"><h3>API Keys ({keys.length})</h3>
        {keys.length?<table><thead><tr><th>Prefix</th><th>Name</th><th>Scopes</th><th>Created</th></tr></thead>
        <tbody>{keys.map((k,i)=><tr key={i}>
          <td style={{fontFamily:'var(--mono)'}}>{k.key_prefix}…</td>
          <td>{k.name}</td>
          <td style={{fontSize:'.7rem'}}>{k.scopes}</td>
          <td style={{fontSize:'.72rem'}}>{fmtDate(k.created_at)}</td>
        </tr>)}</tbody></table>:<Empty text="No API keys"/>}
      </div>
    </div>
  </>;
}

/* ── Login Screen ────────────────────────────────────────────────────────── */

function ProfileModal({user,onClose,onSaved}){
  const [name,setName]=useState(user?.name||'');
  const [avatar,setAvatar]=useState('');
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState('');
  const save=async()=>{
    setSaving(true);setMsg('');
    const body={};
    if(name&&name!==user?.name) body.name=name;
    if(avatar) body.avatar_url=avatar;
    if(!Object.keys(body).length){setMsg('No changes');setSaving(false);return;}
    const r=await apiPut('/org/profile',body);
    setSaving(false);
    if(r&&!r.error){setMsg('Saved!');if(onSaved)onSaved({...user,name:name||user?.name});}
    else setMsg(r?.error||'Failed to save');
  };
  return <div className="profile-modal" onClick={onClose}>
    <div className="pm-box" onClick={e=>e.stopPropagation()}>
      <h2>Edit Profile</h2>
      <div style={{display:'flex',alignItems:'center',gap:'1rem',marginBottom:'1.2rem'}}>
        <div className="avatar" style={{width:48,height:48,borderRadius:'50%',background:'var(--accent)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.2rem',fontWeight:700}}>{(name||user?.email||'?')[0].toUpperCase()}</div>
        <div><div style={{fontWeight:600,color:'var(--text-0)'}}>{name||user?.name||'—'}</div><div style={{fontSize:'.75rem',color:'var(--text-3)',fontFamily:'var(--mono)'}}>{user?.email}</div></div>
      </div>
      <div className="pm-row"><label>Display Name</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name"/></div>
      <div className="pm-row"><label>Avatar URL</label><input value={avatar} onChange={e=>setAvatar(e.target.value)} placeholder="https://..."/></div>
      <div className="pm-row"><label>Role</label><div style={{padding:'.4rem 0',fontSize:'.82rem'}}><span className="badge info">{user?.role}</span></div></div>
      <div className="pm-row"><label>Auth Method</label><div style={{padding:'.4rem 0',fontSize:'.82rem'}}><span className="badge purple">{user?.auth_method}</span></div></div>
      {msg&&<div className={`alert-bar ${msg==='Saved!'?'success':'danger'}`}>{msg}</div>}
      <div className="pm-actions">
        <button className="btn" onClick={onClose}>Cancel</button>
        <button className="btn primary" onClick={save} disabled={saving}>{saving?'Saving…':'Save'}</button>
      </div>
    </div>
  </div>;
}

function UserMenu({user,onProfile,onLogout,onClose}){
  return <>
    <div style={{position:'fixed',inset:0,zIndex:19}} onClick={onClose}/>
    <div className="user-menu">
      <div className="um-header">
        <div className="avatar" style={{width:36,height:36,borderRadius:'50%',background:'var(--accent)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.8rem',fontWeight:700}}>{(user?.name||user?.email||'?')[0].toUpperCase()}</div>
        <div className="um-info"><div className="um-name">{user?.name||'User'}</div><div className="um-email">{user?.email}</div></div>
      </div>
      <div className="um-item" onClick={onProfile}>👤 Edit Profile</div>
      <div className="um-divider"/>
      <div className="um-item danger" onClick={onLogout}>↪ Sign Out</div>
    </div>
  </>;
}

function LoginScreen(){
  const [directMode,setDirectMode]=useState(false);
  const [user,setUser]=useState('open@agentcost.in');
  const [pass,setPass]=useState('admin123');
  const [error,setError]=useState('');
  const [loading,setLoading]=useState(false);

  const loginOIDC=()=>{window.location.href=BASE+'/auth/login?state=/';};

  const loginDirect=async()=>{
    setLoading(true);setError('');
    try{
      // Discover Keycloak URL from auth health endpoint
      let kcBase='';
      try{const h=await(await fetch(BASE+'/auth/health')).json();kcBase=h.keycloak||'';}catch{}
      if(!kcBase) kcBase=BASE.replace(':8100',':8180');
      const r=await fetch(kcBase+'/realms/agentcost/protocol/openid-connect/token',{
        method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:`client_id=agentcost-api&client_secret=agentcost-api-dev-secret&grant_type=password&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`,
      });
      if(!r.ok){setError('Login failed — check credentials');setLoading(false);return;}
      const d=await r.json();
      setToken(d.access_token);
      window.location.reload();
    }catch(e){setError('Cannot reach Keycloak');setLoading(false);}
  };

  return <div className="login-screen">
    <div className="login-box">
      <h1>🧮 Agent<span>Cost</span></h1>
      <div className="tagline">AI Cost Governance Platform</div>
      <button className="btn primary btn-login" onClick={loginOIDC}>Sign in with Keycloak SSO</button>
      <div className="divider">or sign in directly</div>
      <input placeholder="Email" value={user} onChange={e=>setUser(e.target.value)} style={{marginBottom:'.5rem'}}/>
      <input placeholder="Password" type="password" value={pass} onChange={e=>setPass(e.target.value)}/>
      {error&&<div className="alert-bar danger" style={{marginTop:'.5rem'}}>{error}</div>}
      <button className="btn btn-login" onClick={loginDirect} disabled={loading} style={{marginTop:'.6rem'}}>{loading?'Signing in…':'Sign In'}</button>
      <div className="hint">Default: open@agentcost.in / admin123</div>
    </div>
  </div>;
}

/* ── App Shell ───────────────────────────────────────────────────────────── */

const NAV = [
  {section:'Analytics'},{id:'overview',icon:'📊',label:'Overview'},{id:'benchmarks',icon:'🧪',label:'Benchmarks'},{id:'traces',icon:'📡',label:'Traces'},
  {section:'Intelligence'},{id:'forecast',icon:'🔮',label:'Forecast'},{id:'optimizer',icon:'⚡',label:'Optimizer'},{id:'estimator',icon:'🧮',label:'Estimator'},
  {section:'Governance'},{id:'budgets',icon:'💰',label:'Budgets'},{id:'costcenters',icon:'🏢',label:'Cost Centers'},{id:'policies',icon:'🛡️',label:'Policies'},{id:'approvals',icon:'📋',label:'Approvals'},
  {section:'Operations'},{id:'team',icon:'👥',label:'Team'},{id:'notifications',icon:'🔔',label:'Notifications'},{id:'scorecards',icon:'🏆',label:'Scorecards'},
  {section:'System'},{id:'audit',icon:'📝',label:'Audit Log'},{id:'settings',icon:'⚙️',label:'Settings'},
];
const TITLES = {overview:'Overview',benchmarks:'Benchmarks',traces:'Traces',forecast:'Cost Forecast',optimizer:'Cost Optimizer',estimator:'Cost Estimator',budgets:'Budgets',costcenters:'Cost Centers',policies:'Policies',approvals:'Approvals',team:'Team',notifications:'Notifications',scorecards:'Agent Scorecards',audit:'Audit Log',settings:'Settings'};

function App(){
  const [tab,setTab]=useState('overview');const [project,setProject]=useState('');
  const [projects,setProjects]=useState([]);const [connected,setConnected]=useState(false);
  const [pending,setPending]=useState(0);
  const [authState,setAuthState]=useState('loading'); // 'loading' | 'logged_in' | 'logged_out'
  const [user,setUser]=useState(null);
  const [showUserMenu,setShowUserMenu]=useState(false);
  const [showProfile,setShowProfile]=useState(false);

  useEffect(()=>{
    // Check auth status
    (async()=>{
      const health=await api('/api/health');
      setConnected(!!health);
      const authEnabled=health?.auth_enabled!==false;

      if(!authEnabled){
        // Auth disabled — skip login
        setAuthState('logged_in');
        setUser({email:'local@dev',name:'Dev Mode',role:'platform_admin',auth_method:'none',org_id:'default',user_id:'dev'});
      } else {
        // Try to get current user
        const me=await api('/auth/me');
        if(me&&me.email){
          setAuthState('logged_in');
          setUser(me);
        } else {
          setAuthState('logged_out');
        }
      }
      // Load secondary data
      api('/api/projects').then(p=>{if(p&&p.length)setProjects(p);});
      api('/policy/approvals/stats').then(s=>{if(s)setPending(s.pending||0);});
    })();
  },[]);

  const logout=async()=>{setShowUserMenu(false);await apiPost('/auth/logout',{});setToken(null);setAuthState('logged_out');setUser(null);};

  if(authState==='loading') return <div className="login-screen"><div className="login-box"><h1>🧮 Agent<span>Cost</span></h1><div className="tagline">Loading…</div></div></div>;
  if(authState==='logged_out') return <LoginScreen/>;

  return <div className="app">
    <div className="sidebar">
      <div className="sidebar-header"><h1>🧮 Agent<span>Cost</span></h1><div className="ver">v0.5.0 · Enterprise</div></div>
      <div className="sidebar-nav">
        {NAV.map((item,i)=>item.section
          ?<div key={i} className="nav-section">{item.section}</div>
          :<div key={item.id} className={`nav-item ${tab===item.id?'active':''}`} onClick={()=>setTab(item.id)}>
            <span className="icon">{item.icon}</span><span>{item.label}</span>
            {item.id==='approvals'&&pending>0&&<span className="badge-count">{pending}</span>}
          </div>
        )}
      </div>
      <div className="sidebar-footer" style={{position:'relative'}}>
        <div className="status"><div className={`dot ${connected?'':'off'}`}></div><span>{connected?'Connected':'Offline'}</span></div>
        {user&&<div style={{marginTop:'.5rem'}}>
          <div className="user-pill" onClick={()=>setShowUserMenu(!showUserMenu)}>
            <div className="avatar">{(user.name||user.email||'?')[0].toUpperCase()}</div>
            <span className="uname">{user.name||user.email?.split('@')[0]||'User'}</span>
          </div>
          {showUserMenu&&<UserMenu user={user}
            onProfile={()=>{setShowUserMenu(false);setShowProfile(true);}}
            onLogout={logout}
            onClose={()=>setShowUserMenu(false)}
          />}
        </div>}
      </div>
    </div>
    <div className="main">
      <div className="main-header">
        <h2>{TITLES[tab]||tab}</h2>
        <div className="controls">
          {(tab==='overview'||tab==='traces'||tab==='benchmarks'||tab==='forecast'||tab==='optimizer'||tab==='estimator')&&projects.length>0&&<select value={project} onChange={e=>setProject(e.target.value)}>
            <option value="">All Projects</option>{projects.map(p=><option key={p} value={p}>{p}</option>)}
          </select>}
        </div>
      </div>
      <div className="main-content">
        {tab==='overview'&&<Overview project={project}/>}
        {tab==='benchmarks'&&<Benchmarks/>}
        {tab==='traces'&&<Traces project={project}/>}
        {tab==='forecast'&&<ForecastView project={project}/>}
        {tab==='optimizer'&&<OptimizerView project={project}/>}
        {tab==='estimator'&&<EstimatorView/>}
        {tab==='budgets'&&<Budgets/>}
        {tab==='costcenters'&&<CostCenters/>}
        {tab==='policies'&&<Policies/>}
        {tab==='approvals'&&<Approvals/>}
        {tab==='team'&&<Team/>}
        {tab==='notifications'&&<Notifications/>}
        {tab==='scorecards'&&<Scorecards/>}
        {tab==='audit'&&<Audit/>}
        {tab==='settings'&&<Settings user={user}/>}
      </div>
    </div>
    {showProfile&&<ProfileModal user={user} onClose={()=>setShowProfile(false)} onSaved={(u)=>{setUser(u);setShowProfile(false);}}/>}
  </div>;
}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
