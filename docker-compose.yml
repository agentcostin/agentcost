# AgentCost — Docker Compose (with Keycloak SSO + PostgreSQL)
#
# Usage:
#   docker compose up -d
#
# Services:
#   keycloak-db — PostgreSQL for Keycloak
#   keycloak    — Identity Provider (OIDC + SAML) at http://localhost:8080
#   postgres    — PostgreSQL for AgentCost app data
#   migrate     — Runs schema migrations, then exits
#   api         — FastAPI Dashboard + API at http://localhost:8100
#   acp         — ACP WebSocket server (optional, use --profile execution)
#
# Default credentials (change in production!):
#   Keycloak admin:  admin / admin
#   Demo admin:      open@agentcost.in / admin123
#   Demo user:       care@agentcost.in  / user123
#   Postgres:        agentcost / agentcost_secret

services:
  # ── Keycloak Identity Provider ──────────────────────────────────
  keycloak-db:
    image: postgres:16-alpine
    container_name: agentcost-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_secret}
    volumes:
      - keycloak_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - agentcost-net

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: agentcost-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_secret}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./docker/keycloak/agentcost-realm.json:/opt/keycloak/data/import/agentcost-realm.json
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;if timeout 5 grep -q 'UP' <&3; then exit 0; else exit 1; fi"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - agentcost-net

  # ── AgentCost PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agentcost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentcost
      POSTGRES_USER: agentcost
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentcost_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - agentcost_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentcost"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agentcost-net

  # ── Schema Migrations (runs once, then exits) ──────────────────
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: agentcost-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AGENTCOST_DATABASE_URL: postgresql://agentcost:${POSTGRES_PASSWORD:-agentcost_secret}@postgres:5432/agentcost
    command: python agentcost/data/migrations/migrate.py
    restart: "no"
    networks:
      - agentcost-net

  # ── FastAPI Dashboard + API Server ─────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: agentcost-api
    depends_on:
      migrate:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
    environment:
      AGENTCOST_DATABASE_URL: postgresql://agentcost:${POSTGRES_PASSWORD:-agentcost_secret}@postgres:5432/agentcost
      # ── Auth config ──
      AGENTCOST_AUTH_ENABLED: ${AUTH_ENABLED:-true}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: http://localhost:${KEYCLOAK_PORT:-8080}
      KEYCLOAK_REALM: agentcost
      KEYCLOAK_CLIENT_ID: agentcost-api
      KEYCLOAK_CLIENT_SECRET: agentcost-api-dev-secret
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production-please}
      SAML_ENTITY_ID: https://agentcost.local/saml/metadata
      SAML_ACS_URL: http://localhost:${API_PORT:-8100}/auth/saml/acs
      SAML_SLO_URL: http://localhost:${API_PORT:-8100}/auth/saml/slo
    ports:
      - "${API_PORT:-8100}:8100"
    command: python -m agentcost dashboard --host 0.0.0.0 --port 8100
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - agentcost-net

  # ── ACP WebSocket Server (optional) ────────────────────────────
  acp:
    build:
      context: ./acp-server
      dockerfile: ../docker/Dockerfile
    container_name: agentcost-acp
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${ACP_PORT:-8765}:8765"
    environment:
      API_URL: http://api:8100
    restart: unless-stopped
    profiles:
      - execution
    networks:
      - agentcost-net

volumes:
  keycloak_pgdata:
    driver: local
  agentcost_pgdata:
    driver: local

networks:
  agentcost-net:
    driver: bridge